name: Bug Report
description: Report a problem to help improve DevToolBox
labels: ['bug']
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe what you saw and what you expected to happen.
      placeholder: '...'
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: DevToolBox version / build number
      placeholder: 'v1.0.0 / build xxxx'

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots (optional)
      placeholder: 'Paste logs or a link to screenshots'
