name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version (leave empty to use package.json version)
        required: false
        default: ''
      build:
        description: Build number (leave empty to auto-generate YYMMDDNNN)
        required: false
        default: ''
      tag:
        description: Release tag (leave empty to use <version>-<build>)
        required: false
        default: ''
      include_macos_x64:
        description: Build macOS Intel (x64)
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      version: ${{ steps.vars.outputs.version }}
      build: ${{ steps.vars.outputs.build }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Compute release vars
        id: vars
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_BUILD: ${{ github.event.inputs.build }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: node scripts/release-vars.mjs compute >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-latest
            macArgs: --arm64
          - name: windows-x64
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Apply version/build
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_BUILD: ${{ needs.prepare.outputs.build }}
        run: node scripts/release-vars.mjs apply

      - name: Marketplace Build
        run: pnpm -C marketplace build

      - name: Write builtin backup key
        run: node -e "const fs=require('node:fs'); const k=process.env.SECRET_KEY; if(!k){ console.log('SECRET_KEY is not set. Using built-in dev backup key.'); process.exit(0);} fs.writeFileSync('key.txt', k, 'utf-8');"
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}

      - name: Prepare macOS signing
        if: runner.os == 'macOS'
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/devtoolbox-signing.p12"
          API_KEY_PATH="$RUNNER_TEMP/apple-api-key.p8"

          python3 -c "import base64,os,pathlib; pathlib.Path(os.environ['CERT_PATH']).write_bytes(base64.b64decode(os.environ['MAC_CERT_P12_BASE64'])); pathlib.Path(os.environ['API_KEY_PATH']).write_bytes(base64.b64decode(os.environ['APPLE_API_KEY_P8_BASE64']))"

          security create-keychain -p "$MAC_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MAC_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MAC_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$MAC_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "CSC_LINK=$CERT_PATH" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY=$API_KEY_PATH" >> "$GITHUB_ENV"
        env:
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          MAC_KEYCHAIN_PASSWORD: ${{ secrets.MAC_KEYCHAIN_PASSWORD }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          CERT_PATH: ${{ runner.temp }}/devtoolbox-signing.p12
          API_KEY_PATH: ${{ runner.temp }}/apple-api-key.p8

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: pnpm package:mac -- ${{ matrix.macArgs }}
        env:
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: pnpm package:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: |
            release/**/DevToolBox-*-mac-*.dmg
            release/**/DevToolBox-*-mac-*.dmg.blockmap
            release/**/DevToolBox-*-mac-*.zip
            release/**/DevToolBox-*-mac-*.zip.blockmap
            release/**/DevToolBox-*-win-*.exe
            release/**/DevToolBox-*-win-*.exe.blockmap
            release/**/latest*.yml
            release/**/latest*.yaml

  build_macos_x64:
    needs: prepare
    if: ${{ github.event.inputs.include_macos_x64 == 'true' }}
    runs-on: macos-13
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Apply version/build
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_BUILD: ${{ needs.prepare.outputs.build }}
        run: node scripts/release-vars.mjs apply

      - name: Marketplace Build
        run: pnpm -C marketplace build

      - name: Write builtin backup key
        run: node -e "const fs=require('node:fs'); const k=process.env.SECRET_KEY; if(!k){ console.log('SECRET_KEY is not set. Using built-in dev backup key.'); process.exit(0);} fs.writeFileSync('key.txt', k, 'utf-8');"
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}

      - name: Prepare macOS signing
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/devtoolbox-signing.p12"
          API_KEY_PATH="$RUNNER_TEMP/apple-api-key.p8"

          python3 -c "import base64,os,pathlib; pathlib.Path(os.environ['CERT_PATH']).write_bytes(base64.b64decode(os.environ['MAC_CERT_P12_BASE64'])); pathlib.Path(os.environ['API_KEY_PATH']).write_bytes(base64.b64decode(os.environ['APPLE_API_KEY_P8_BASE64']))"

          security create-keychain -p "$MAC_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MAC_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MAC_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$MAC_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "CSC_LINK=$CERT_PATH" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY=$API_KEY_PATH" >> "$GITHUB_ENV"
        env:
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          MAC_KEYCHAIN_PASSWORD: ${{ secrets.MAC_KEYCHAIN_PASSWORD }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          CERT_PATH: ${{ runner.temp }}/devtoolbox-signing.p12
          API_KEY_PATH: ${{ runner.temp }}/apple-api-key.p8

      - name: Package (macOS x64)
        run: pnpm package:mac -- --x64
        env:
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts (macOS x64)
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-x64
          path: |
            release/**/DevToolBox-*-mac-*.dmg
            release/**/DevToolBox-*-mac-*.dmg.blockmap
            release/**/DevToolBox-*-mac-*.zip
            release/**/DevToolBox-*-mac-*.zip.blockmap
            release/**/latest*.yml
            release/**/latest*.yaml

  release:
    needs: [prepare, build, build_macos_x64]
    if: ${{ always() && needs.build.result == 'success' && (needs.build_macos_x64.result == 'success' || needs.build_macos_x64.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts (macOS arm64)
        uses: actions/download-artifact@v4
        with:
          name: release-macos-arm64
          path: release-macos-arm64

      - name: Download artifacts (macOS x64)
        if: ${{ github.event.inputs.include_macos_x64 == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: release-macos-x64
          path: release-macos-x64

      - name: Download artifacts (Windows)
        uses: actions/download-artifact@v4
        with:
          name: release-windows-x64
          path: release-windows

      - name: Release (Attempt 1)
        id: release1
        uses: softprops/action-gh-release@v2
        continue-on-error: true
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: DevToolBox v${{ needs.prepare.outputs.version }} (Build ${{ needs.prepare.outputs.build }})
          body: |
            Version: v${{ needs.prepare.outputs.version }}
            Build: ${{ needs.prepare.outputs.build }}
          target_commitish: main
          files: |
            release-macos-arm64/**/DevToolBox-*-mac-*.dmg
            release-macos-arm64/**/DevToolBox-*-mac-*.dmg.blockmap
            release-macos-arm64/**/DevToolBox-*-mac-*.zip
            release-macos-arm64/**/DevToolBox-*-mac-*.zip.blockmap
            release-macos-arm64/**/latest*.yml
            release-macos-arm64/**/latest*.yaml
            release-macos-x64/**/DevToolBox-*-mac-*.dmg
            release-macos-x64/**/DevToolBox-*-mac-*.dmg.blockmap
            release-macos-x64/**/DevToolBox-*-mac-*.zip
            release-macos-x64/**/DevToolBox-*-mac-*.zip.blockmap
            release-macos-x64/**/latest*.yml
            release-macos-x64/**/latest*.yaml
            release-windows/**/DevToolBox-*-win-*.exe
            release-windows/**/DevToolBox-*-win-*.exe.blockmap
            release-windows/**/latest*.yml
            release-windows/**/latest*.yaml
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait (Retry)
        if: steps.release1.outcome == 'failure'
        run: sleep 180

      - name: Release (Attempt 2)
        id: release2
        if: steps.release1.outcome == 'failure'
        uses: softprops/action-gh-release@v2
        continue-on-error: true
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: DevToolBox v${{ needs.prepare.outputs.version }} (Build ${{ needs.prepare.outputs.build }})
          body: |
            Version: v${{ needs.prepare.outputs.version }}
            Build: ${{ needs.prepare.outputs.build }}
          target_commitish: main
          files: |
            release-macos-arm64/**/DevToolBox-*-mac-*.dmg
            release-macos-arm64/**/DevToolBox-*-mac-*.dmg.blockmap
            release-macos-arm64/**/DevToolBox-*-mac-*.zip
            release-macos-arm64/**/DevToolBox-*-mac-*.zip.blockmap
            release-macos-arm64/**/latest*.yml
            release-macos-arm64/**/latest*.yaml
            release-macos-x64/**/DevToolBox-*-mac-*.dmg
            release-macos-x64/**/DevToolBox-*-mac-*.dmg.blockmap
            release-macos-x64/**/DevToolBox-*-mac-*.zip
            release-macos-x64/**/DevToolBox-*-mac-*.zip.blockmap
            release-macos-x64/**/latest*.yml
            release-macos-x64/**/latest*.yaml
            release-windows/**/DevToolBox-*-win-*.exe
            release-windows/**/DevToolBox-*-win-*.exe.blockmap
            release-windows/**/latest*.yml
            release-windows/**/latest*.yaml
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait (Retry)
        if: steps.release2.outcome == 'failure'
        run: sleep 420

      - name: Release (Attempt 3)
        if: steps.release2.outcome == 'failure'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: DevToolBox v${{ needs.prepare.outputs.version }} (Build ${{ needs.prepare.outputs.build }})
          body: |
            Version: v${{ needs.prepare.outputs.version }}
            Build: ${{ needs.prepare.outputs.build }}
          target_commitish: main
          files: |
            release-macos-arm64/**/DevToolBox-*-mac-*.dmg
            release-macos-arm64/**/DevToolBox-*-mac-*.dmg.blockmap
            release-macos-arm64/**/DevToolBox-*-mac-*.zip
            release-macos-arm64/**/DevToolBox-*-mac-*.zip.blockmap
            release-macos-arm64/**/latest*.yml
            release-macos-arm64/**/latest*.yaml
            release-macos-x64/**/DevToolBox-*-mac-*.dmg
            release-macos-x64/**/DevToolBox-*-mac-*.dmg.blockmap
            release-macos-x64/**/DevToolBox-*-mac-*.zip
            release-macos-x64/**/DevToolBox-*-mac-*.zip.blockmap
            release-macos-x64/**/latest*.yml
            release-macos-x64/**/latest*.yaml
            release-windows/**/DevToolBox-*-win-*.exe
            release-windows/**/DevToolBox-*-win-*.exe.blockmap
            release-windows/**/latest*.yml
            release-windows/**/latest*.yaml
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
