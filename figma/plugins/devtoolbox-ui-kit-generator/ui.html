<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0;
        padding: 16px;
        font: 12px/1.4 -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }
      .title {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 10px;
      }
      .desc {
        color: rgba(0, 0, 0, 0.65);
        margin-bottom: 12px;
      }
      button {
        appearance: none;
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        background: #0d99ff;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .row {
        margin-top: 10px;
        display: flex;
        gap: 8px;
      }
      .ghost {
        background: #f2f2f2;
        color: #111;
      }
      .log {
        margin-top: 12px;
        padding: 10px;
        border-radius: 8px;
        background: #f6f6f6;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 220px;
        overflow: auto;
        font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Monaco, Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <div class="title">DevToolBox UI Kit Generator</div>
    <div class="desc">会创建/更新 Tokens（Styles）、基础 Components 与 Templates（结构化 Frame）。可重复运行。</div>
    <button id="gen">生成/更新 UI Kit</button>
    <div class="row">
      <button id="close" class="ghost">关闭</button>
    </div>
    <div id="log" class="log"></div>
    <script>
      const gen = document.getElementById('gen')
      const close = document.getElementById('close')
      const log = document.getElementById('log')
      function append(msg) {
        log.textContent = (log.textContent ? log.textContent + '\n' : '') + msg
        log.scrollTop = log.scrollHeight
      }
      window.onmessage = (event) => {
        const msg = event.data && event.data.pluginMessage
        if (!msg) return
        if (msg.type === 'log') append(msg.text)
        if (msg.type === 'done') {
          append('完成')
          gen.disabled = false
        }
        if (msg.type === 'error') {
          append('错误: ' + msg.text)
          gen.disabled = false
        }
      }
      gen.onclick = () => {
        gen.disabled = true
        log.textContent = ''
        parent.postMessage({ pluginMessage: { type: 'generate' } }, '*')
      }
      close.onclick = () => parent.postMessage({ pluginMessage: { type: 'close' } }, '*')
      append('准备就绪')
    </script>
  </body>
</html>
